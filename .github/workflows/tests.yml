name: Tests

on:
  push:
    branches: [develop, main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/tests.yml"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"
  pull_request:
    branches: [develop, main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/tests.yml"
      - "pyproject.toml"
      - "package.json"
      - "package-lock.json"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests (Python 3.13)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run pytest with coverage
        run: |
          cd backend
          coverage run -m pytest tests/test_core.py -v --tb=short --junit-xml=pytest-results.xml
          coverage xml -o coverage.xml
          coverage report -m
        continue-on-error: false

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: backend/pytest-results.xml
          retention-days: 7

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 30

      - name: Generate coverage summary
        if: always()
        run: |
          cd backend
          coverage report -m > coverage-summary.txt
          cat coverage-summary.txt
        continue-on-error: true

  frontend-lint-build:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run linter
        run: |
          cd frontend
          npm run lint -- --max-warnings 0

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Verify bundle size (max 450KB combined)
        run: |
          cd frontend
          JS_SIZE=$(du -b dist/assets/index.js | awk '{print $1}')
          CSS_SIZE=$(du -b dist/assets/index.css | awk '{print $1}')
          TOTAL=$((JS_SIZE + CSS_SIZE))
          MAX_SIZE=$((450 * 1024))

          echo "Bundle size: JS=${JS_SIZE} bytes, CSS=${CSS_SIZE} bytes, Total=${TOTAL} bytes (max=${MAX_SIZE})"
          if [ $TOTAL -gt $MAX_SIZE ]; then
            echo "ERROR: Bundle exceeds ${MAX_SIZE} bytes limit"
            exit 1
          fi
          echo "✓ Bundle size check passed"
