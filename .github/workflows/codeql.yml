name: "CodeQL"

on:
  push:
    branches: [ main, develop ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/codeql.yml"
  pull_request:
    branches: [ main, develop ]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/codeql.yml"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Set up Python (for Python analysis)
        if: matrix.language == 'python'
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install backend dependencies (for Python analysis)
        if: matrix.language == 'python'
        run: pip install -r backend/requirements.txt

      - name: Set up Node.js (for JavaScript analysis)
        if: matrix.language == 'javascript-typescript'
        uses: actions/setup-node@v7
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install frontend dependencies (for JavaScript analysis)
        if: matrix.language == 'javascript-typescript'
        run: cd frontend && npm ci

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
          upload: ${{ github.ref == 'refs/heads/main' }}
