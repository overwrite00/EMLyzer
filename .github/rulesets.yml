rules:
  # ════════════════════════════════════════════════════════════════════════════
  # MAIN BRANCH — Production-Ready
  # ════════════════════════════════════════════════════════════════════════════
  - name: "Protect main branch"
    description: "Enforce strict protection on production branch — requires review, status checks, and clean history"
    target: branch
    conditions:
      ref_name:
        include:
          - "main"

    rules:
      # Richiedi PR con 1 reviewer
      - type: "pull_request"
        parameters:
          required_approving_review_count: 1
          require_code_owner_review: false
          require_last_push_approval: true
          dismiss_stale_reviews_on_push: false
          require_review_thread_resolution: true

      # Status checks obbligatori (CodeQL + tests)
      - type: "status_checks"
        parameters:
          strict: true
          required_status_checks:
            - "analyze / Analyze (python)"
            - "analyze / Analyze (javascript-typescript)"
            - "Backend Tests (Python 3.13)"
            - "Frontend Lint & Build"

      # Vietare force pushes
      - type: "non_fast_forward"
        parameters:
          restricted: true

      # Vietare deletions
      - type: "deletion"
        parameters:
          restricted: true

      # Vietare alterazioni history
      - type: "required_linear_history"
        parameters:
          restricted: true

  # ════════════════════════════════════════════════════════════════════════════
  # DEVELOP BRANCH — Integration/Development
  # ════════════════════════════════════════════════════════════════════════════
  - name: "Protect develop branch"
    description: "Enforce PR and test requirements on development branch — allows feature branch cleanup"
    target: branch
    conditions:
      ref_name:
        include:
          - "develop"

    rules:
      # Richiedi PR con 1 reviewer
      - type: "pull_request"
        parameters:
          required_approving_review_count: 1
          require_code_owner_review: false
          require_last_push_approval: true
          dismiss_stale_reviews_on_push: false
          require_review_thread_resolution: true

      # Status checks obbligatori (CodeQL + tests)
      - type: "status_checks"
        parameters:
          strict: true
          required_status_checks:
            - "analyze / Analyze (python)"
            - "analyze / Analyze (javascript-typescript)"
            - "Backend Tests (Python 3.13)"
            - "Frontend Lint & Build"

      # Vietare force pushes
      - type: "non_fast_forward"
        parameters:
          restricted: true

      # Permetti deletions su develop (cleanup deprecated branches)
      - type: "deletion"
        parameters:
          restricted: false

      # Vietare alterazioni history
      - type: "required_linear_history"
        parameters:
          restricted: true
