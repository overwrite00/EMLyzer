version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "lang:python"
      - "scope:backend"
    commit-message:
      prefix: "chore(deps-backend)"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-updates:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Dev-only deps: block majors, keep production deps fully updated.
      # `ignore` does not support `dependency-type`, so dev deps are named explicitly.
      - dependency-name: "pytest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pytest-asyncio"
        update-types: ["version-update:semver-major"]
      - dependency-name: "httpx"
        update-types: ["version-update:semver-major"]

  # Frontend JavaScript dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "lang:javascript"
      - "scope:frontend"
    commit-message:
      prefix: "chore(deps-frontend)"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      development-updates:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # Dev-only deps: block majors, keep production deps (react, react-dom,
      # react-router-dom, axios, lucide-react) fully updated. `ignore` does not
      # support `dependency-type`, so dev deps are named explicitly.
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react-hooks"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint-plugin-react-refresh"
        update-types: ["version-update:semver-major"]
      - dependency-name: "globals"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]

  # GitHub Actions — no major version ignore (CI/CD security-critical)
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "type:ci"
      - "scope:deps"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
