version: 2
updates:
  # Backend Python dependencies
  - package-ecosystem: "pip"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "lang:python"
      - "scope:backend"
    commit-message:
      prefix: "chore(deps-backend)"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "production"
        update-types:
          - "minor"
          - "patch"
      development-updates:
        dependency-types:
          - "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
        dependency-type: "development"

  # Frontend JavaScript dependencies
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "lang:javascript"
      - "scope:frontend"
    commit-message:
      prefix: "chore(deps-frontend)"
      include: "scope"
    groups:
      minor-and-patch:
        dependency-types:
          - "production"
        update-types:
          - "minor"
          - "patch"
      development-updates:
        dependency-types:
          - "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
        dependency-type: "development"

  # GitHub Actions — no major version ignore (CI/CD security-critical)
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "type:ci"
      - "scope:deps"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
